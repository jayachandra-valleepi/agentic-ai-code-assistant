name: Deploy AI Coding Assistant

on:
  push:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPO }}
  IMAGE_TAG: latest


jobs:

  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      IMAGE_URI: ${{ steps.set-output.outputs.IMAGE_URI }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag & Push Image
        id: set-output
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_OUTPUT


  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Stop old container
        run: |
          docker stop ai-app || true
          docker rm ai-app || true

      - name: Debug IMAGE URI
        run: |
          echo "IMAGE_URI = ${{ needs.build-and-push.outputs.IMAGE_URI }}"

      - name: Pull and Run Docker Image
        run: |
          IMAGE_URI="${{ needs.build-and-push.outputs.IMAGE_URI }}"

          docker pull "$IMAGE_URI"

          docker run -d \
            --name ai-app \
            -p 8000:8000 \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            "$IMAGE_URI"